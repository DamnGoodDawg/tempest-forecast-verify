# .github/workflows/pat-probe.yml   ← TEMPORARY. Delete after one run.
name: PAT neighbor-access probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Tempest API access tiers
        env:
          TOKEN: ${{ secrets.TEMPEST_TOKEN }}
        run: |
          set +x                      # never trace the token
          base="https://swd.weatherflow.com/swd/rest"
          probe () {
            code=$(curl -s -o /tmp/b.json -w "%{http_code}" "$1")
            msg=$(grep -o '"status_message":"[^"]*"' /tmp/b.json | head -1)
            echo "$2 -> HTTP $code  $msg"
          }
          echo "== control =="
          probe "$base/observations/station/219397?token=$TOKEN"           "own_station_219397"
          echo "== the question =="
          probe "$base/observations/station/197638?token=$TOKEN"           "neighbor_station_197638"
          probe "$base/observations/?device_id=177977&token=$TOKEN"        "neighbor_device_177977"
          echo "== bonus =="
          probe "$base/map/stations?lat_min=33.71&lon_min=-84.19&lat_max=34.16&lon_max=-82.96&token=$TOKEN" "map_stations_bbox"
          probe "$base/observations/network/stations?lat_min=33.71&lon_min=-84.19&lat_max=34.16&lon_max=-82.96&token=$TOKEN" "network_obs_bbox"
