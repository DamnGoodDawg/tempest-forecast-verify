# .github/workflows/capture.yml — daily forecast capture + scoring
# Repo secrets required: TEMPEST_TOKEN, TEMPEST_STATION_ID
name: daily-forecast-capture
on:
  schedule:
    # 10:23 UTC: off the congested top-of-hour (observed drift 1.2-3.8 h past 11:00) and
    # early enough to buy DST headroom. = 06:23 EDT / 05:23 EST.
    - cron: "23 10 * * *"
  workflow_dispatch: {}     # manual trigger for testing
concurrency:
  group: capture            # never let two capture runs race the same data/ + scores.json push
jobs:
  capture:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      # Core capture. Fails LOUD (exit 1) if the irreplaceable Tempest snapshot is missed,
      # but the commit step below still runs so whatever WAS captured is never lost.
      - name: Capture forecasts
        env:
          TEMPEST_TOKEN: ${{ secrets.TEMPEST_TOKEN }}
          TEMPEST_STATION_ID: ${{ secrets.TEMPEST_STATION_ID }}
        run: python capture.py

      # Parser/scoring smoke tests (NWS attribution, missing-field tolerance, unit
      # conversions, NaN guard, DM). The API's documented failure mode is silently dropping
      # fields — this is the insurance. Runs even if capture failed; a red test blocks scoring.
      - name: Run tests
        if: always()
        run: python -m unittest test_extract

      # Re-score from all snapshots into scores.json. Runs even if capture failed, so the
      # dashboard reflects the latest scorable data. extract.py never crashes the run.
      - name: Extract scores
        if: always()
        run: python extract.py

      - name: Commit snapshots + scores
        if: always()
        run: |
          git config user.name "forecast-capture-bot"
          git config user.email "actions@github.com"
          git add data/ scores.json
          git commit -m "capture $(date -u +%F)" || echo "nothing to commit"
          git pull --rebase --autostash || true
          git push
